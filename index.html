<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summit Tee</title>
    <style>
      :root {
        --bg: #f7f2e8;
        --ink: #1c1b1a;
        --panel: #fffdf8;
        --accent: #d4522d;
        --accent-dark: #a83e22;
        --muted: #6f655d;
        --line: #e8ddcf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 10%, #fff4d9 0, transparent 35%),
          radial-gradient(circle at 90% 20%, #ffe2d5 0, transparent 30%),
          var(--bg);
      }

      .wrap {
        max-width: 1040px;
        margin: 0 auto;
        padding: 28px 16px 52px;
      }

      .badge {
        display: inline-block;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 12px;
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
      }

      h1 {
        font-size: clamp(34px, 7vw, 58px);
        margin: 14px 0 10px;
        line-height: 0.95;
      }

      .sub {
        margin: 0 0 26px;
        color: var(--muted);
        max-width: 60ch;
      }

      .product {
        display: grid;
        grid-template-columns: 1fr;
        gap: 22px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        overflow: hidden;
      }

      .image-box {
        padding: 24px;
        background: linear-gradient(160deg, #fff8f2, #fff);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 430px;
      }

      .mockup-stage {
        width: min(100%, 500px);
        aspect-ratio: 1 / 1.15;
        padding: 12px;
        border-radius: 18px;
        background:
          radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.75), transparent 46%),
          linear-gradient(180deg, #f6ecdf 0%, #f3e6d7 100%);
      }

      .tee-mockup {
        position: relative;
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 26px 26px rgba(42, 31, 25, 0.2));
      }

      .tee-body {
        position: absolute;
        inset: 12% 16% 6%;
        border-radius: 20% 20% 12% 12% / 13% 13% 10% 10%;
        background: linear-gradient(180deg, #faf9f7 0%, #ece9e4 100%);
        box-shadow: inset 0 0 0 2px rgba(218, 214, 205, 0.9), inset 0 -24px 40px rgba(0, 0, 0, 0.05);
      }

      .tee-sleeve {
        position: absolute;
        top: 18%;
        width: 28%;
        height: 24%;
        background: linear-gradient(180deg, #f9f7f5 0%, #e5e1da 100%);
        box-shadow: inset 0 0 0 2px rgba(218, 214, 205, 0.85);
      }

      .tee-sleeve.left {
        left: 2%;
        border-radius: 58% 12% 40% 18%;
        transform: rotate(10deg);
      }

      .tee-sleeve.right {
        right: 2%;
        border-radius: 12% 58% 18% 40%;
        transform: rotate(-10deg);
      }

      .tee-collar {
        position: absolute;
        top: 12%;
        left: 50%;
        width: 20%;
        height: 9%;
        transform: translateX(-50%);
        border-radius: 0 0 45% 45%;
        background: #ddd8d0;
        box-shadow: inset 0 -4px 0 rgba(255, 255, 255, 0.75);
      }

      .tee-print {
        position: absolute;
        left: 30%;
        top: 30%;
        width: 40%;
        height: 40%;
        border-radius: 10px;
        background: #f9f7f2;
        box-shadow: 0 5px 12px rgba(0, 0, 0, 0.14), inset 0 0 0 1px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }

      .tee-print img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        padding: 10px;
      }

      .details {
        padding: 22px;
      }

      .title-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
      }

      .title-row h2 {
        margin: 0;
        font-size: clamp(24px, 4vw, 34px);
      }

      .price {
        font-weight: 700;
        font-size: 28px;
      }

      .desc {
        color: var(--muted);
        margin: 10px 0 20px;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 120px;
        gap: 12px;
      }

      select,
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px 10px;
        font-size: 16px;
        background: white;
      }

      .cta {
        margin-top: 14px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 13px 14px;
        font-size: 16px;
        font-weight: 700;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-dark);
      }

      .total {
        font-weight: 700;
      }

      .note {
        margin-top: 14px;
        font-size: 13px;
        color: var(--muted);
      }

      @media (min-width: 860px) {
        .product {
          grid-template-columns: 1.2fr 1fr;
        }

        .image-box {
          padding: 34px;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <span class="badge">Limited Drop</span>
      <h1>Summit Tee</h1>
      <p class="sub">
        One shirt. One design. Clean heavyweight cotton with your uploaded artwork front and center.
      </p>

      <section class="product">
        <article class="card image-box">
          <div class="mockup-stage">
            <div class="tee-mockup">
              <div class="tee-sleeve left"></div>
              <div class="tee-sleeve right"></div>
              <div class="tee-body"></div>
              <div class="tee-collar"></div>
              <div class="tee-print">
                <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAYAAAAGACAYAAACkx7W/AAAAAXNSR0IArs4c6QAABzJJREFUeJzt3bFqnmUYgGF/yVIcBAvFDnUopVPFScgpBAq6CIWcQnoGHXMGySlkDQ7R4AmEQCdxbQrFoeLgJt2M55An8PJxX9f+8L0//3DzLu+zuzq/uf0MgJzPVx8AgDUEACBKAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAovZWH4CZg6PD1Udgwy5Pz1YfgYXcAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAonZX5ze3qw9RNn3P/4uv/H3c3b//7Ebz9glsmxsAQJQAAEQJAECUAABECQBAlAAARAkAQJQAAEQJAECUAABECQBAlAAARAkAQJQAAEQJAECUfQBD3vOnzD6BbXMDAIgSAIAoAQCIEgCAKAEAiBIAgCgBAIgSAIAoAQCIEgCAKAEAiBIAgCgBAIgSAIAoAQCIyu8DmL7n/+y7r+/pJNDz7ve/RvP2Ccy4AQBECQBAlAAARAkAQJQAAEQJAECUAABECQBAlAAARAkAQJQAAEQJAECUAABECQBAlAAARO2tPkDdxz8/juYfP3ns+76/2e+zlhsAQJQAAEQJAECUAABECQBAlAAARAkAQJQAAEQJAECUAABECQBAlAAARAkAQJQAAEQJAEDU7ur85nb1Ibbs4OhwNP/21YfR/MMXj0bzq/395U+rj8DA/uuL0fzl6dk9nYS7cAMAiBIAgCgBAIgSAIAoAQCIEgCAKAEAiBIAgCgBAIgSAIAoAQCIEgCAKAEAiBIAgCgBAIjaW30Atm3r7/lP37O/Pnl5Tye5m62fn7XcAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAouwD2Linbx6M5t8ff7qnkwBb4wYAECUAAFECABAlAABRAgAQJQAAUQIAECUAAFECABAlAABRAgAQJQAAUQIAECUAAFECABBlHwBL7b++GM1fn7xcOr/a6vNPv79/dDiavzw9G83XuQEARAkAQJQAAEQJAECUAABECQBAlAAARAkAQJQAAEQJAECUAABECQBAlAAARAkAQJQAAETtrs5vblcfouxg+B7621cfRvMPXzwazT9982A0v/o9e7Ztuk+ivk/ADQAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIGpv9QHqpu+Rfz/cJ/D++NNoHtguNwCAKAEAiBIAgCgBAIgSAIAoAQCIEgCAKAEAiBIAgCgBAIgSAIAoAQCIEgCAKAEAiBIAgKjd1fnN7epDsM7BcJ/A9cnL0fz+64vRPG3TfRp1bgAAUQIAECUAAFECABAlAABRAgAQJQAAUQIAECUAAFECABAlAABRAgAQJQAAUQIAECUAAFF7qw/Atk3f85/uE2Ct6f/vPf+13AAAogQAIEoAAKIEACBKAACiBAAgSgAAogQAIEoA               </div>
            </div>
          </div>
        </article>

        <article class="card details">
          <div class="title-row">
            <h2>Signature T-Shirt</h2>
            <span class="price">$32.00</span>
          </div>

          <p class="desc">
            100% combed cotton, relaxed fit, pre-shrunk. Ships in 3-5 days.
          </p>

          <div class="controls">
            <select id="size" aria-label="Choose size">
              <option value="S">Size: Small</option>
              <option value="M" selected>Size: Medium</option>
              <option value="L">Size: Large</option>
              <option value="XL">Size: XL</option>
            </select>
            <input id="qty" type="number" min="1" max="10" value="1" aria-label="Quantity" />
          </div>

          <div class="cta">
            <button id="buy">Checkout Now</button>
            <span class="total" id="total">Total: $32.00</span>
          </div>

          <p class="note" id="note">Ready to order: 1 x Medium.</p>
          <p class="note"><a href="/checkout?size=M&qty=1">Prefer manual checkout? Open checkout form.</a></p>
        </article>
      </section>
    </main>

    <script>
      const price = 32;
      const size = document.getElementById('size');
      const qty = document.getElementById('qty');
      const total = document.getElementById('total');
      const note = document.getElementById('note');
      const buy = document.getElementById('buy');

      function updateSummary() {
        const count = Math.max(1, Number(qty.value) || 1);
        qty.value = count;
        total.textContent = `Total: $${(count * price).toFixed(2)}`;
        note.textContent = `Ready to order: ${count} x ${size.value}.`;
      }

      function manualCheckoutUrl() {
        return `/checkout?size=${encodeURIComponent(size.value)}&qty=${encodeURIComponent(String(Math.max(1, Number(qty.value) || 1)))}`;
      }

      size.addEventListener('change', updateSummary);
      qty.addEventListener('input', updateSummary);

      buy.addEventListener('click', async () => {
        buy.disabled = true;
        buy.textContent = 'Loading...';
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 1500);

        try {
          const response = await fetch('/api/checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              qty: Math.max(1, Number(qty.value) || 1),
              size: size.value
            }),
            signal: controller.signal
          });

          clearTimeout(timeoutId);

          if (!response.ok) {
            throw new Error('Checkout request failed.');
          }

          const data = await response.json();
          if (data.url) {
            window.location.href = data.url;
            return;
          }

          if (data.fallbackUrl) {
            window.location.href = data.fallbackUrl;
            return;
          }

          throw new Error('Checkout URL missing.');
        } catch (_err) {
          clearTimeout(timeoutId);
          window.location.href = manualCheckoutUrl();
        } finally {
          buy.disabled = false;
          buy.textContent = 'Checkout Now';
        }
      });
    </script>
  </body>
</html>
