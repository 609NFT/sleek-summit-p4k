<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Summit Tee</title>
    <style>
      :root {
        --bg: #f7f2e8;
        --ink: #1c1b1a;
        --panel: #fffdf8;
        --line: #e8ddcf;
        --accent: #d4522d;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 18px;
      }

      h1 { margin: 0 0 14px; }
      p { margin: 6px 0; }
      .muted { color: #6f655d; }

      label {
        display: block;
        margin-top: 12px;
        font-weight: 600;
      }

      input {
        width: 100%;
        margin-top: 6px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px 10px;
        font-size: 16px;
      }

      button {
        width: 100%;
        margin-top: 16px;
        border: 0;
        border-radius: 10px;
        padding: 13px;
        background: var(--accent);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }

      .back {
        display: inline-block;
        margin-top: 12px;
        color: #6f655d;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="card">
        <h1>Checkout</h1>
        <p id="summary"></p>
        <p id="total" class="muted"></p>
        <p class="muted">If Stripe is not configured yet, this form sends you a direct order notification.</p>

        <form id="order-form">
          <label>
            Full name
            <input id="name" required />
          </label>
          <label>
            Email
            <input id="email" type="email" required />
          </label>
          <label>
            Shipping address
            <input id="address" required />
          </label>
          <button type="submit">Send Order Request</button>
        </form>
        <a class="back" href="/">Back to product</a>
      </div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const qty = Math.max(1, Number(params.get('qty')) || 1);
      const size = (params.get('size') || 'M').toUpperCase();
      const unitPrice = 29.99;
      const total = (qty * unitPrice).toFixed(2);

      document.getElementById('summary').textContent = `Order: ${qty} x Summit Tee (${size})`;
      document.getElementById('total').textContent = `Total due: $${total}`;

      document.getElementById('order-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const address = document.getElementById('address').value.trim();

        const button = event.target.querySelector('button[type="submit"]');
        button.disabled = true;
        button.textContent = 'Submitting...';

        try {
          const response = await fetch('/api/manual-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, address, qty, size })
          });

          if (!response.ok) {
            throw new Error('Order submit failed.');
          }

          button.textContent = 'Order submitted';
          document.getElementById('summary').textContent = 'Order received. We will contact you by email.';
        } catch (_error) {
          button.disabled = false;
          button.textContent = 'Send Order Request';
          alert('Could not send order right now. Please try again.');
        }
      });
    </script>
  </body>
</html>
